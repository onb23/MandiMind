kind = "web"
previewPath = "/"
title = "MandiMind"
version = "1.0.0"
id = "artifacts/mandimind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18833

[services.development]
run = "pnpm --filter @workspace/mandimind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mandimind", "run", "build" ]
publicDir = "artifacts/mandimind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18833"
BASE_PATH = "/"
