# Cloudflare Pages — MandiMind Frontend
# Docs: https://developers.cloudflare.com/pages/configuration/wrangler-configuration/
#
# Build & deploy:
#   1. pnpm run build                   (inside artifacts/mandimind/)
#   2. wrangler pages deploy dist       (or connect GitHub repo in CF dashboard)
#
# The Vite build outputs to artifacts/mandimind/dist/
# The /api/* proxy in vite.config.ts (dev only) must point at the deployed Worker URL in production.

name = "mandimind"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Environment variables ─────────────────────────────────────────────────────
# The frontend is purely static — no server-side secrets needed here.
# The API Worker (mandimind-api) handles all DATA_GOV_API_KEY usage.
[vars]
NODE_ENV = "production"
VITE_API_BASE = "https://mandimind.omkarborade-11.workers.dev"

# ── Preview (Pages) ───────────────────────────────────────────────────────────
# Cloudflare Pages automatically handles:
#   - Global CDN distribution
#   - HTTPS / TLS
#   - Preview deployments per branch
#
# After deploying the Worker, update the frontend to call the Worker URL directly
# in production instead of the /api proxy. Example:
#   VITE_API_BASE=https://mandimind-api.<your-account>.workers.dev
